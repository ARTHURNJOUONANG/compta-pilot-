# Production : HTTPS (Caddy) + app + volume SQLite persistant
# Usage : docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  caddy:
    image: caddy:2-alpine
    container_name: compta-pilot-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_started

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compta-pilot
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: file:/data/compta.db
      UPLOADS_DIR: /data/uploads
      NODE_ENV: production
    volumes:
      - compta_data:/data
    expose:
      - "3000"

volumes:
  compta_data:
    name: compta_pilot_prod_data
  caddy_data:
  caddy_config:
