services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compta-pilot
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3000"
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: file:/data/compta.db
      UPLOADS_DIR: /data/uploads
      NODE_ENV: production
    volumes:
      - compta_data:/data
    depends_on:
      - mailpit

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: compta-pilot-mail
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"

volumes:
  compta_data:
    name: compta_pilot_data
